name: TurboQuant+ Linux Release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref to build'
        required: true
        default: 'tqp-v0.2.0'
      release_tag:
        description: 'Existing release tag to upload assets to'
        required: true
        default: 'tqp-v0.2.0'

env:
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON"

jobs:
  linux-cpu:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ALL_VARIANTS=ON \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc)

      - name: Pack
        run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ inputs.release_tag }}-linux-x64-cpu.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ inputs.release_tag }}," -C ./build/bin .

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: linux-x64-cpu
          path: turboquant-plus-${{ inputs.release_tag }}-linux-x64-cpu.tar.gz

  linux-vulkan:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Dependencies
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y build-essential mesa-vulkan-drivers vulkan-sdk libssl-dev

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_VULKAN=ON \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc)

      - name: Pack
        run: |
          cp LICENSE ./build/bin/
          tar -czvf turboquant-plus-${{ inputs.release_tag }}-linux-x64-vulkan.tar.gz \
            --transform "s,^\.,turboquant-plus-${{ inputs.release_tag }}," -C ./build/bin .

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: linux-x64-vulkan
          path: turboquant-plus-${{ inputs.release_tag }}-linux-x64-vulkan.tar.gz

  release:
    needs: [linux-cpu, linux-vulkan]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: ./release/*
